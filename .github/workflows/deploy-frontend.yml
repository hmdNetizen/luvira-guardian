name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Configure SSH ──────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.HOST }}" >> ~/.ssh/known_hosts

      # ── 3. Write env file to server ───────────────────────────────────────
      - name: Write env file
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            "${{ secrets.USERNAME }}@${{ secrets.HOST }}" \
            "mkdir -p /home/luvira_admin/luvira-guardian/frontend && cat > /home/luvira_admin/luvira-guardian/frontend/.env.production" << EOF
          AUTH0_SECRET=${{ secrets.AUTH0_SECRET }}
          AUTH0_BASE_URL=${{ secrets.FRONTEND_BASE_URL }}
          AUTH0_ISSUER_BASE_URL=${{ secrets.AUTH0_ISSUER_BASE_URL }}
          AUTH0_CLIENT_ID=${{ secrets.AUTH0_CLIENT_ID }}
          AUTH0_CLIENT_SECRET=${{ secrets.AUTH0_CLIENT_SECRET }}
          AUTH0_AUDIENCE=${{ secrets.AUTH0_AUDIENCE }}
          AUTH0_DOMAIN=${{ secrets.NEXT_PUBLIC_AUTH0_DOMAIN }}
          NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_AUTH0_DOMAIN=${{ secrets.NEXT_PUBLIC_AUTH0_DOMAIN }}
          EOF

      # ── 4. Deploy ─────────────────────────────────────────────────────────
      - name: Deploy frontend
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "${{ secrets.USERNAME }}@${{ secrets.HOST }}" << 'SSHEOF'

            set -euo pipefail

            APP_DIR="/home/luvira_admin/luvira-guardian"
            IMAGE="luvira-guardian-frontend:latest"
            CONTAINER="luvira-guardian-frontend"

            echo "==> Pulling latest code..."
            cd "$APP_DIR"
            git pull origin main

            echo "==> Building Docker image..."
            docker build -f frontend/Dockerfile \
              --build-arg NEXT_PUBLIC_BASE_URL="$(grep NEXT_PUBLIC_BASE_URL $APP_DIR/frontend/.env.production | cut -d= -f2)" \
              --build-arg NEXT_PUBLIC_AUTH0_DOMAIN="$(grep NEXT_PUBLIC_AUTH0_DOMAIN $APP_DIR/frontend/.env.production | cut -d= -f2)" \
              -t "$IMAGE" frontend/

            echo "==> Replacing container..."
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm   "$CONTAINER" 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --network host \
              --env-file "$APP_DIR/frontend/.env.production" \
              "$IMAGE"

            echo "==> Pruning dangling images..."
            docker image prune -f

            echo "==> Container status:"
            docker ps --filter "name=$CONTAINER"

          SSHEOF

      # ── 4. Health check ───────────────────────────────────────────────────
      - name: Health check
        run: |
          sleep 10
          curl --fail --silent --show-error "https://auth.myluvira.com"
